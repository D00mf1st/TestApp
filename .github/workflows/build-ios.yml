name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Debug - Liste iOS Dateien
        run: |
          echo "=== iOS Ordner Inhalt ==="
          ls -la ios/
          echo "=== Workspaces ==="
          find ios -name "*.xcworkspace" -maxdepth 2
          echo "=== Schemes ==="
          find ios -name "*.xcscheme" -maxdepth 5

      - name: Build .app direkt
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 2 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            build 2>&1 | tail -50

      - name: Package IPA
        run: |
          APP=$(find ios/build/DerivedData -name "*.app" -path "*/Release-iphoneos/*" | head -1)
          echo "App gefunden: $APP"
          mkdir -p ios/build/output/Payload
          cp -r "$APP" ios/build/output/Payload/
          cd ios/build/output
          zip -r TestApp.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TestApp-IPA
          path: ios/build/output/TestApp.ipa