name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build App
        run: |
          xcodebuild \
            -project TestApp/TestApp.xcodeproj \
            -scheme TestApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            build 2>&1 | tail -20

      - name: Package IPA
        run: |
          echo "=== Suche .app ==="
          find build -name "*.app" 2>/dev/null || echo "Nichts in build/"
          find . -name "*.app" -not -path "*/node_modules/*" 2>/dev/null | head -10

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TestApp-IPA
          path: output/TestApp.ipa