name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Archive App
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 2 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Workspace: $WORKSPACE / Scheme: $SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ios/build/TestApp.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SKIP_INSTALL=NO \
            | tail -30

      - name: Debug Archive
        run: |
          echo "=== Archive Inhalt ==="
          find ios/build/TestApp.xcarchive -name "*.app" | head -10
          echo "=== App Binary suchen ==="
          find ios/build/TestApp.xcarchive -type f | grep -v ".dSYM" | head -30

      - name: Package IPA aus Archive
        run: |
          APP=$(find ios/build/TestApp.xcarchive/Products \
            -name "*.app" -not -name "*.appex" | head -1)
          echo "App gefunden: $APP"
          echo "App Größe: $(du -sh "$APP")"
          mkdir -p ios/build/output/Payload
          cp -r "$APP" ios/build/output/Payload/TestApp.app
          cd ios/build/output
          zip -r TestApp.ipa Payload
          echo "IPA Größe: $(ls -lh TestApp.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TestApp-IPA
          path: ios/build/output/TestApp.ipa