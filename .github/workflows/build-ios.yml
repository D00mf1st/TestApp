name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --non-interactive

      - name: Patch Podfile - Code Signing deaktivieren
        run: |
          cat >> ios/Podfile << 'RUBY'

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['DEVELOPMENT_TEAM'] = ''
              end
            end
          end
          RUBY
          echo "Podfile gepatcht"
          tail -20 ios/Podfile

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Patch xcframework Shell Scripts
        run: |
          find ios/Pods -name "*.sh" -exec grep -l "xcodebuild" {} \; \
            | while read f; do
              echo "Patching: $f"
              sed -i '' \
                's/xcodebuild /xcodebuild CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" /g' \
                "$f"
            done
          echo "Alle Scripts gepatcht"

      - name: Build App
        run: |
          cd ios
          xcodebuild \
            -workspace TestApp.xcworkspace \
            -scheme TestApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            build 2>&1 | tee /tmp/build.log | tail -30

      - name: Package IPA
        run: |
          APP=$(find ios/build/DerivedData/Build/Products/Release-iphoneos \
            -maxdepth 1 -name "*.app" | head -1)
          echo "App: $APP ($(du -sh "$APP" | cut -f1))"
          mkdir -p ios/build/output/Payload
          cp -r "$APP" ios/build/output/Payload/TestApp.app
          cd ios/build/output
          zip -r TestApp.ipa Payload
          ls -lh TestApp.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TestApp-IPA
          path: ios/build/output/TestApp.ipa