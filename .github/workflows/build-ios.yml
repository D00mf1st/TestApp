name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build App
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 2 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Workspace: $WORKSPACE / Scheme: $SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build/DerivedData \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            build 2>&1 | tee /tmp/build.log | tail -20
          echo "Build Exit Code: $?"

      - name: Debug - Alles finden
        if: always()
        run: |
          echo "=== Alle .app Ordner ==="
          find ios/build -name "*.app" 2>/dev/null || echo "Keine .app gefunden"

          echo ""
          echo "=== Alle Binaries in DerivedData ==="
          find ios/build/DerivedData -type f -not -name "*.o" \
            -not -name "*.d" -not -name "*.swp" \
            -not -path "*/ModuleCache*" \
            | head -40

          echo ""
          echo "=== Build Log - letzte Fehler ==="
          grep -E "^(error:|warning:|FAILED|BUILD)" /tmp/build.log | tail -20