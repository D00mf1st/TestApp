name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build .app
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 2 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            build 2>&1 | tail -30

      - name: Package IPA
        run: |
          APP=$(find ios/build/DerivedData/Build/Products/Release-iphoneos \
            -maxdepth 1 -name "*.app" | head -1)
          echo "App Ordner: $APP"
          echo "App Inhalt:"
          ls -la "$APP"

          # Info.plist aus Quellcode kopieren falls fehlend
          if [ ! -f "$APP/Info.plist" ]; then
            echo "Info.plist fehlt im Bundle – kopiere aus Quellcode..."
            SOURCE=$(find ios -name "Info.plist" \
              -not -path "*/build/*" \
              -not -path "*/Pods/*" | head -1)
            echo "Quelle: $SOURCE"
            cp "$SOURCE" "$APP/Info.plist"
          fi

          echo "Info.plist vorhanden:"
          ls -la "$APP/Info.plist"

          mkdir -p ios/build/output/Payload
          cp -r "$APP" ios/build/output/Payload/TestApp.app
          cd ios/build/output
          zip -r TestApp.ipa Payload
          echo "IPA erstellt:"
          ls -lh TestApp.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TestApp-IPA
          path: ios/build/output/TestApp.ipa